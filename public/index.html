<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahoot | Тест платформасы</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* Rahoot стиліндегі анимациялық фон */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 80% 80%, rgba(255,255,255,0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .main-card {
            max-width: 1200px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo h1 {
            font-size: 4rem;
            font-weight: 900;
            color: white;
            text-shadow: 0 10px 30px rgba(0,0,0,0.2);
            letter-spacing: -0.02em;
        }

        .logo p {
            color: rgba(255,255,255,0.9);
            font-size: 1.2rem;
            margin-top: 0.5rem;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .card {
            background: white;
            border-radius: 2rem;
            padding: 2.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 50px rgba(0,0,0,0.2);
        }

        .card-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
        }

        .card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .card p {
            color: #666;
            margin-bottom: 1.5rem;
        }

        .card-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .card-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        /* Modal стилі */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            animation: modalPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalPop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-content h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: #333;
        }

        .modal-content input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 1rem;
            font-size: 1rem;
            margin-bottom: 1rem;
            transition: border-color 0.3s;
        }

        .modal-content input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
        }

        .modal-btn {
            flex: 1;
            padding: 0.8rem;
            border: none;
            border-radius: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn-cancel {
            background: #f0f0f0;
            color: #666;
        }

        .modal-btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        @media (max-width: 768px) {
            .logo h1 { font-size: 2.5rem; }
            .cards-grid { grid-template-columns: 1fr; }
            .card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card">
            <div class="logo">
                <h1>🎮 Nurik</h1>
                <p>Интерактивті тест платформасы</p>
            </div>
            
            <div class="cards-grid">
                <div class="card" onclick="showParticipantModal()">
                    <div class="card-icon">👨‍🎓</div>
                    <h2>Қолданушы</h2>
                    <p>Тестке қосылып, біліміңізді сынаңыз</p>
                    <button class="card-btn">Қосылу →</button>
                </div>
                
                <div class="card" onclick="showAdminModal()">
                    <div class="card-icon">👨‍💼</div>
                    <h2>Админ</h2>
                    <p>Тесттерді басқарыңыз және бақылаңыз</p>
                    <button class="card-btn">Кіру →</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Қолданушы модальді терезесі -->
    <div id="participantModal" class="modal">
        <div class="modal-content">
            <h2>🎮 Тестке қосылу</h2>
            <input type="text" id="participantName" placeholder="Аты-жөніңіз">
            <input type="text" id="participantCode" placeholder="6 цифрлы код" maxlength="6">
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="closeParticipantModal()">Болдырмау</button>
                <button class="modal-btn modal-btn-submit" onclick="joinTest()">Қосылу</button>
            </div>
        </div>
    </div>

    <!-- Админ модальді терезесі -->
    <div id="adminModal" class="modal">
        <div class="modal-content">
            <h2>🔐 Админ кіру</h2>
            <input type="password" id="adminPassword" placeholder="Пароль">
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="closeAdminModal()">Болдырмау</button>
                <button class="modal-btn modal-btn-submit" onclick="loginAdmin()">Кіру</button>
            </div>
        </div>
    </div>

    <script>
        function showParticipantModal() {
            document.getElementById('participantModal').style.display = 'flex';
        }

        function closeParticipantModal() {
            document.getElementById('participantModal').style.display = 'none';
        }

        function showAdminModal() {
            document.getElementById('adminModal').style.display = 'flex';
        }

        function closeAdminModal() {
            document.getElementById('adminModal').style.display = 'none';
        }

        function loginAdmin() {
            const password = document.getElementById('adminPassword').value;
            if (password === 'admin12344') {
                localStorage.setItem('adminToken', 'authenticated');
                window.location.href = '/admin';
            } else {
                alert('Қате пароль!');
            }
        }

        function joinTest() {
            const name = document.getElementById('participantName').value.trim();
            const code = document.getElementById('participantCode').value.trim();
            
            if (!name) {
                alert('Аты-жөніңізді енгізіңіз!');
                return;
            }
            if (!code || code.length !== 6) {
                alert('6 цифрлы кодты енгізіңіз!');
                return;
            }
            
            localStorage.setItem('participantName', name);
            localStorage.setItem('sessionCode', code);
            localStorage.setItem('participantId', Date.now().toString());
            window.location.href = '/waiting/' + code;
        }

        // Enter кілтін қолдау
        document.getElementById('participantCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') joinTest();
        });
        document.getElementById('adminPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') loginAdmin();
        });
    </script>
</body>
</html>
