<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rahoot | Админ панелі</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo h1 {
            font-size: 2rem;
            color: white;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .logo p {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }

        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        /* Grid */
        .admin-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
        }

        /* Left Panel */
        .left-panel {
            background: white;
            border-radius: 30px;
            padding: 25px;
            height: fit-content;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Upload Form */
        .upload-form input, .upload-form select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 1rem;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        .upload-form input:focus, .upload-form select:focus {
            outline: none;
            border-color: #667eea;
        }

        .upload-btn {
            width: 100%;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(34,197,94,0.3);
        }

        /* Tests List */
        .tests-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
        }

        .test-item {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .test-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateX(5px);
        }

        .test-item.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea10 0%, #764ba210 100%);
        }

        .test-name {
            font-weight: 700;
            color: #333;
        }

        .test-info {
            font-size: 0.8rem;
            color: #888;
            margin-top: 5px;
        }

        /* Settings Panel */
        .settings-panel {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .setting-group {
            margin-bottom: 20px;
        }

        .setting-label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        .time-input {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time-input input {
            width: 100px;
            text-align: center;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .checkbox-group input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .create-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
        }

        .create-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        /* Right Panel - Monitoring */
        .right-panel {
            background: white;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .session-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 20px;
            color: white;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .session-code-box {
            background: rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 15px;
            text-align: center;
        }

        .session-code {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 5px;
        }

        .start-btn {
            background: #22c55e;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(34,197,94,0.4);
        }

        .start-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        /* Participants List */
        .participants-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .participant-card {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .participant-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .participant-name {
            font-weight: 700;
            color: #333;
            font-size: 1.1rem;
        }

        .participant-score {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .progress-bar-container {
            background: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #22c55e, #16a34a);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .participant-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.75rem;
            color: #888;
        }

        /* Results Section */
        .results-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
        }

        .ranking-list {
            margin-top: 15px;
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9ff;
            border-radius: 15px;
            margin-bottom: 8px;
        }

        .ranking-position {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
        }

        .position-1 { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
        .position-2 { background: linear-gradient(135deg, #94a3b8, #64748b); }
        .position-3 { background: linear-gradient(135deg, #f97316, #ea580c); }

        .stats-btn {
            background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: all 0.3s;
        }

        .stats-btn:hover {
            transform: scale(1.02);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 90%;
            max-height: 80%;
            overflow-y: auto;
            width: 500px;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .close-modal {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #888;
        }

        .full-stats-table {
            width: 100%;
            border-collapse: collapse;
        }

        .full-stats-table th, .full-stats-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .full-stats-table th {
            background: #f0f0f0;
            font-weight: 700;
        }

        @media (max-width: 900px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div class="logo">
                <h1>🎮 Nurik Admin</h1>
                <p>Тесттерді басқару және бақылау</p>
            </div>
            <button class="logout-btn" onclick="logout()">🚪 Шығу</button>
        </div>

        <div class="admin-grid">
            <!-- Left Panel -->
            <div class="left-panel">
                <div class="section-title">
                    📤 Тест жүктеу
                </div>
                <form id="uploadForm" class="upload-form">
                    <input type="text" id="testName" placeholder="Тест атауы">
                    <input type="file" id="testFile" accept=".txt">
                    <button type="submit" class="upload-btn">📂 Жүктеу</button>
                </form>

                <div class="section-title" style="margin-top: 25px;">
                    📋 Тесттер
                </div>
                <div id="testsList" class="tests-list">
                    <div style="text-align: center; color: #888;">Жүктелуде...</div>
                </div>

                <div id="settingsPanel" class="settings-panel" style="display: none;">
                    <div class="section-title">
                        ⚙️ Параметрлер
                    </div>
                    
                    <div class="setting-group">
                        <div class="setting-label">Сұрақтарды таңдау:</div>
                        <select id="questionSelectMode" onchange="toggleQuestionMode()" style="width:100%; padding:10px; border-radius:12px; border:2px solid #e0e0e0;">
                            <option value="all">Барлық сұрақтар</option>
                            <option value="range">Диапазон бойынша</option>
                            <option value="random">Кездейсоқ сұрақтар</option>
                        </select>
                        <div id="rangeInput" style="display:none; margin-top:10px;">
                            <input type="text" id="questionRange" placeholder="Мысалы: 1-50">
                        </div>
                        <div id="randomInput" style="display:none; margin-top:10px;">
                            <select id="randomCount" style="width:100%; padding:10px; border-radius:12px;">
                                <option value="10">10 сұрақ</option>
                                <option value="20">20 сұрақ</option>
                                <option value="30">30 сұрақ</option>
                                <option value="40">40 сұрақ</option>
                                <option value="50">50 сұрақ</option>
                            </select>
                        </div>
                    </div>

                    <div class="setting-group">
                        <div class="setting-label">Уақыт шектеуі (секунд):</div>
                        <div class="time-input">
                            <input type="number" id="timeLimit" value="30" min="5" max="120">
                            <span>секунд</span>
                        </div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="shuffleQuestions">
                        <label>Сұрақтарды араластыру</label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="shuffleAnswers">
                        <label>Жауаптарды араластыру</label>
                    </div>

                    <button id="createSessionBtn" class="create-btn">🚀 Сессия бастау</button>
                </div>
            </div>

            <!-- Right Panel -->
            <div class="right-panel" id="monitoringPanel" style="display: none;">
                <div class="session-info">
                    <div>
                        <div style="font-size:0.8rem; opacity:0.8;">Ағымдағы тест</div>
                        <div id="testNameDisplay" style="font-weight:700; font-size:1.1rem;"></div>
                    </div>
                    <div class="session-code-box">
                        <div style="font-size:0.7rem;">Ойын коды</div>
                        <div id="sessionCodeDisplay" class="session-code"></div>
                    </div>
                    <button id="startTestBtn" class="start-btn">🎯 Бастау</button>
                </div>

                <div class="section-title">
                    👥 Қатысушылар (<span id="participantCount">0</span>)
                </div>
                <div id="participantsList" class="participants-list">
                    <div style="text-align: center; color: #888; padding: 40px;">Қатысушылар күтілуде...</div>
                </div>

                <div id="resultsSection" class="results-section" style="display: none;">
                    <div class="section-title">
                        🏆 Нәтижелер рейтингі
                    </div>
                    <div id="rankingList" class="ranking-list"></div>
                    <button id="fullStatsBtn" class="stats-btn">📊 Толық статистика</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Толық статистика модальды терезесі -->
    <div id="statsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeStatsModal()">&times;</span>
            <h2>📊 Толық статистика</h2>
            <div id="fullStatsContent"></div>
        </div>
    </div>

    <script>
        let socket = null;
        let currentSessionCode = null;
        let currentTestId = null;
        let currentQuestionsCount = 0;
        let currentTestName = '';

        // Аутентификация
        function checkAuth() {
            const token = localStorage.getItem('adminToken');
            if (token !== 'authenticated') {
                window.location.href = '/';
                return false;
            }
            return true;
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/';
        }

        if (!checkAuth()) {}

        // Тесттерді жүктеу
        async function loadTests() {
            const res = await fetch('/api/tests');
            const tests = await res.json();
            const container = document.getElementById('testsList');
            
            if (tests.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:#888;">📭 Тесттер жоқ</div>';
                return;
            }
            
            container.innerHTML = tests.map(test => `
                <div class="test-item ${currentTestId === test.id ? 'selected' : ''}" onclick="selectTest('${test.id}', '${escapeHtml(test.name)}', ${test.questionCount})">
                    <div class="test-name">${escapeHtml(test.name)}</div>
                    <div class="test-info">${test.questionCount} сұрақ</div>
                </div>
            `).join('');
        }

        function selectTest(id, name, count) {
            currentTestId = id;
            currentTestName = name;
            currentQuestionsCount = count;
            document.getElementById('settingsPanel').style.display = 'block';
            loadTests();
        }

        function toggleQuestionMode() {
            const mode = document.getElementById('questionSelectMode').value;
            document.getElementById('rangeInput').style.display = 'none';
            document.getElementById('randomInput').style.display = 'none';
            
            if (mode === 'range') {
                document.getElementById('rangeInput').style.display = 'block';
            } else if (mode === 'random') {
                document.getElementById('randomInput').style.display = 'block';
            }
        }

        // Сессия бастау
        document.getElementById('createSessionBtn').addEventListener('click', () => {
            if (!currentTestId) {
                alert('Тест таңдаңыз!');
                return;
            }
            
            const mode = document.getElementById('questionSelectMode').value;
            let settings = {
                shuffleQuestions: document.getElementById('shuffleQuestions').checked,
                shuffleAnswers: document.getElementById('shuffleAnswers').checked,
                timeLimit: document.getElementById('timeLimit').value
            };
            
            if (mode === 'range') {
                const range = document.getElementById('questionRange').value;
                if (!range) {
                    alert('Диапазонды енгізіңіз!');
                    return;
                }
                settings.questionRange = range;
            } else if (mode === 'random') {
                settings.randomCount = document.getElementById('randomCount').value;
            } else {
                settings.allQuestions = true;
            }
            
            if (socket) socket.disconnect();
            socket = io();
            
            socket.on('connect', () => {
                socket.emit('admin-create-session', { testId: currentTestId, settings });
            });
            
            socket.on('session-created', (data) => {
                currentSessionCode = data.sessionCode;
                document.getElementById('monitoringPanel').style.display = 'block';
                document.getElementById('testNameDisplay').innerHTML = `${currentTestName} (${data.totalQuestions} сұрақ)`;
                document.getElementById('sessionCodeDisplay').innerHTML = currentSessionCode;
                
                // Кодты көшіруге арналған хабарлама
                alert(`Сессия құрылды! Код: ${currentSessionCode}\nҚолданушыларға осы кодты беріңіз.`);
            });
            
            socket.on('participants-update', (participants) => {
                const container = document.getElementById('participantsList');
                document.getElementById('participantCount').innerHTML = participants.length;
                
                if (participants.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:#888; padding:40px;">Қатысушылар күтілуде...</div>';
                    return;
                }
                
                container.innerHTML = participants.map(p => `
                    <div class="participant-card">
                        <div class="participant-header">
                            <span class="participant-name">${escapeHtml(p.name)}</span>
                            <span class="participant-score">${p.answered}/${currentQuestionsCount}</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" style="width: ${(p.answered / currentQuestionsCount) * 100}%"></div>
                        </div>
                        <div class="participant-stats">
                            <span>${Math.round((p.answered / currentQuestionsCount) * 100)}% аяқталды</span>
                        </div>
                    </div>
                `).join('');
            });
            
            socket.on('all-finished', (data) => {
                const ranking = data.ranking;
                const container = document.getElementById('rankingList');
                document.getElementById('resultsSection').style.display = 'block';
                
                container.innerHTML = ranking.map((r, idx) => `
                    <div class="ranking-item">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <div class="ranking-position ${idx === 0 ? 'position-1' : idx === 1 ? 'position-2' : idx === 2 ? 'position-3' : ''}" style="${idx > 2 ? 'background:#94a3b8' : ''}">
                                ${idx + 1}
                            </div>
                            <div>
                                <div style="font-weight:600;">${escapeHtml(r.name)}</div>
                                <div style="font-size:0.7rem; color:#888;">${r.correctCount}/${currentQuestionsCount} дұрыс</div>
                            </div>
                        </div>
                        <div style="font-weight:800; color:#667eea;">${r.score}%</div>
                    </div>
                `).join('');
            });
            
            socket.on('participant-progress', (data) => {
                // Прогресті жаңарту
                const participants = document.querySelectorAll('.participant-card');
                for (let p of participants) {
                    if (p.querySelector('.participant-name').innerText === data.name) {
                        p.querySelector('.participant-score').innerHTML = `${data.answered}/${data.total}`;
                        p.querySelector('.progress-bar-fill').style.width = `${data.percent}%`;
                        p.querySelector('.participant-stats span').innerHTML = `${data.percent}% аяқталды`;
                        break;
                    }
                }
            });
            
            document.getElementById('startTestBtn').onclick = () => {
                if (currentSessionCode) {
                    socket.emit('admin-start-test', { sessionCode: currentSessionCode });
                    document.getElementById('startTestBtn').disabled = true;
                    document.getElementById('startTestBtn').innerHTML = '✅ Тест басталды';
                    alert('Тест басталды!');
                }
            };
            
            document.getElementById('fullStatsBtn').onclick = () => {
                socket.emit('get-full-stats', { sessionCode: currentSessionCode });
            };
            
            socket.on('full-stats', (data) => {
                const stats = data.stats;
                const modal = document.getElementById('statsModal');
                const content = document.getElementById('fullStatsContent');
                
                let html = `<h3>${escapeHtml(data.testName)}</h3>`;
                html += `<table class="full-stats-table">`;
                html += `<tr><th>#</th><th>Қатысушы</th><th>Пайыз</th><th>Дұрыс</th><th>Уақыт</th></tr>`;
                stats.forEach((s, idx) => {
                    html += `<tr>
                        <td>${idx + 1}</td>
                        <td>${escapeHtml(s.name)}</td>
                        <td style="font-weight:800; color:#667eea;">${s.score}%</td>
                        <td>${s.correctCount}/${s.totalQuestions}</td>
                        <td>${s.timeSpent ? Math.floor(s.timeSpent/60)+'м '+s.timeSpent%60+'с' : '-'}</td>
                    </tr>`;
                });
                html += `</table>`;
                content.innerHTML = html;
                modal.style.display = 'flex';
            });
        });
        
        // Файл жүктеу
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('testFile');
            const testName = document.getElementById('testName').value;
            
            if (!fileInput.files[0]) {
                alert('Файл таңдаңыз!');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            if (testName) formData.append('name', testName);
            
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            if (data.success) {
                alert(`Тест сәтті жүктелді! ${data.questionCount} сұрақ`);
                document.getElementById('testFile').value = '';
                document.getElementById('testName').value = '';
                loadTests();
            } else {
                alert('Қате: ' + data.error);
            }
        });
        
        function closeStatsModal() {
            document.getElementById('statsModal').style.display = 'none';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        loadTests();
        
        // Модальды терезені сыртқы жерге басқанда жабу
        window.onclick = function(event) {
            const modal = document.getElementById('statsModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
