<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>К. Янг интернетке тәуелділік шкаласы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 8px;
            font-size: 24px;
            font-weight: bold;
            word-wrap: break-word;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .test-form {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .user-info {
            background: #f0f4f8;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .user-info input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            -webkit-appearance: none;
            appearance: none;
            background: white;
        }

        .user-info input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 2px rgba(42, 82, 152, 0.2);
        }

        .questions-wrapper {
            max-height: 60vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .question-item {
            background: #f8fafc;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .question-text {
            font-weight: 600;
            margin-bottom: 10px;
            color: #1e293b;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .question-number {
            display: inline-block;
            background: #2a5298;
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            text-align: center;
            line-height: 26px;
            font-size: 12px;
            margin-right: 8px;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
        }

        .option {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            background: white;
            padding: 6px 10px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            font-size: 11px;
            transition: all 0.2s;
        }

        .option.selected {
            background: #2a5298;
            border-color: #2a5298;
        }

        .option.selected span {
            color: white;
        }

        .option input {
            display: none;
        }

        .option span {
            font-size: 11px;
            color: #334155;
        }

        .btn-submit {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            display: block;
            margin: 20px auto 0;
            width: 100%;
            max-width: 280px;
            -webkit-appearance: none;
            appearance: none;
            transition: opacity 0.2s;
        }

        .btn-submit:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .result-message {
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            font-weight: 500;
            display: none;
            font-size: 14px;
        }

        .result-message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .result-message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .result-message.loading {
            background: #e2e3e5;
            color: #383d41;
            display: block;
        }

        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 20px;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .test-form {
                padding: 15px;
            }
            .option {
                padding: 4px 8px;
            }
            .option span {
                font-size: 10px;
            }
            .question-text {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>К. Янгтың интернетке тәуелділік шкаласы</h1>
        <div class="subtitle">20 сұраққа шынайы жауап беріңіз</div>

        <div class="test-form">
            <div class="user-info">
                <input type="text" id="fullName" placeholder="Аты-жөні (толық)" autocomplete="off">
                <input type="text" id="groupName" placeholder="Топ атауы / Курс" autocomplete="off">
                <input type="date" id="testDate" placeholder="Күні">
            </div>

            <div class="questions-wrapper" id="questionsContainer"></div>

            <button class="btn-submit" onclick="submitTest()">📨 Жіберу</button>
            <div id="resultMessage" class="result-message"></div>
        </div>
        <div class="footer">
            * Нәтиже .txt файл ретінде Telegram ботқа жіберіледі
        </div>
    </div>

    <script>
        // Telegram бот параметрлері
        const BOT_TOKEN = "8775618619:AAG_Be6EiZ3t8HZk6NhrxZNcSZWrFY0reIs";
        const CHAT_ID = "5032693846";

        // Сұрақтар тізімі
        const questions = [
            "Интернетте жоспарлағаныңыздан көбірек уақыт өткізетініңізді жиі байқайсыз ба?",
            "Интернетте көбірек уақыт өткізу үшін үй шаруасына жиі немқұрайлы қарайсыз ба?",
            "Сіз достарыңызбен жеке араласқаннан гөрі желіде болғанды жиі қалайсыз ба?",
            "Желіде отырып интернет қолданушыларымен қаншалықты жиі танысасыз?",
            "Адамдар Сізден Интернетте қанша уақыт өткізетініңізді жиі сұрай ма?",
            "Желіде тым көп уақыт өткізгеніңіз үшін мектепте немесе жұмыста үлгеріміңіз жиі төмендей ме?",
            "Қажетті басқа нәрсені жасамас бұрын әлеуметтік желіні жиі тексересіз бе?",
            "Сіздің оқуыңыз интернетке қызығушылыққа байланысты жиі төмендей ме?",
            "Желіде немен айналысатыныңызды сұрағанда, Сіз жиі қорғанып жасырынасыз ба?",
            "Сіз өзіңіздің шынайы өміріңіз туралы алаңдататын ойларды Интернет туралы жайлы ойлармен жиі ысырасыз ба?",
            "Қайтадан желіде болуды асыға күтіп жүргеніңізді жиі байқайсыз ба?",
            "Интернетсіз өмір қызықсыз, бос және қуанышсыз екенін жиі сезінесіз бе?",
            "Біреу Сізді желідегі әрекетіңізден алшақтатуға тырысқанда Сіз жиі ұрысып, айқайлап немесе басқаша ренжігеніңізді білдіресіз бе?",
            "Интернетте көп отыру арқылы Сіз ұйқыға жиі назар аудармайсыз ба?",
            "Сіз офлайн режимінде желіде не істейтініңізді жиі болжайсыз ба немесе желіде болуды қиялдайсыз ба?",
            "Желіде онлайн болған кезде, Сіз өзіңізге қаншалықты жиі «тағы бір минут» деп айтасыз?",
            "Желіде өткізетін уақытыңызды қысқартуға тырысқанда жиі сәтсіздікке ұшырайсыз ба?",
            "Желіде өткізетін уақытыңызды жиі жасыруға тырысасыз ба?",
            "Сіз достарыңызбен жүрудің орнына интернетте уақыт өткізуді жиі таңдайсыз ба?",
            "Желіде болмай қалған кезде Сіз жиі көңіл-күйдің түсуіне немесе қобалжуға ұшырайсыз ба? және қайта желіге қосылғаннан кейін оның басылатынын байқайсыз ба?"
        ];

        // Жауап нұсқалары
        const options = [
            { value: 1, label: "1-Ешқашан" },
            { value: 2, label: "2-Өте сирек" },
            { value: 3, label: "3-Кейде" },
            { value: 4, label: "4-Үнемі" },
            { value: 5, label: "5-Әрқашан" }
        ];

        // Жауаптарды сақтау массиві
        let selectedAnswers = new Array(20).fill(null);

        // Күнді автоматты орнату
        function setDefaultDate() {
            const dateInput = document.getElementById('testDate');
            if (dateInput) {
                const today = new Date();
                const year = today.getFullYear();
                const month = String(today.getMonth() + 1).padStart(2, '0');
                const day = String(today.getDate()).padStart(2, '0');
                dateInput.value = `${year}-${month}-${day}`;
            }
        }

        // Жауапты таңдау функциясы
        function selectAnswer(questionIndex, value) {
            selectedAnswers[questionIndex] = value;
            
            // Барлық опциялардың стилін жаңарту
            for (let optValue of [1, 2, 3, 4, 5]) {
                const optionDiv = document.getElementById(`opt_${questionIndex}_${optValue}`);
                if (optionDiv) {
                    if (selectedAnswers[questionIndex] === optValue) {
                        optionDiv.classList.add('selected');
                    } else {
                        optionDiv.classList.remove('selected');
                    }
                }
            }
        }

        // Сұрақтарды көрсету
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            if (!container) return;

            let html = '';
            for (let i = 0; i < questions.length; i++) {
                const questionNumber = i + 1;
                html += `
                    <div class="question-item">
                        <div class="question-text">
                            <span class="question-number">${questionNumber}</span>
                            ${questions[i]}
                        </div>
                        <div class="options" id="options_${i}">
                `;
                for (let opt of options) {
                    const isSelected = (selectedAnswers[i] === opt.value);
                    html += `
                        <div class="option ${isSelected ? 'selected' : ''}" id="opt_${i}_${opt.value}" onclick="selectAnswer(${i}, ${opt.value})">
                            <span>${opt.label}</span>
                        </div>
                    `;
                }
                html += `</div></div>`;
            }
            container.innerHTML = html;
        }

        // Жауаптарды жинау
        function collectAnswers() {
            let allAnswered = true;
            for (let i = 0; i < selectedAnswers.length; i++) {
                if (selectedAnswers[i] === null) {
                    allAnswered = false;
                    break;
                }
            }
            return { answers: selectedAnswers, allAnswered };
        }

        // Жауап мәтінін алу
        function getAnswerText(value) {
            const map = {
                1: "Ешқашан (1 балл)",
                2: "Өте сирек (2 балл)",
                3: "Кейде (3 балл)",
                4: "Үнемі (4 балл)",
                5: "Әрқашан (5 балл)"
            };
            return map[value] || "-";
        }

        // TXT файлын жасау
        function createTxtFile(fullName, groupName, testDate, answers, totalScore) {
            let formattedDate = testDate;
            if (testDate) {
                const dateParts = testDate.split('-');
                if (dateParts.length === 3) {
                    formattedDate = `${dateParts[2]}.${dateParts[1]}.${dateParts[0]}`;
                }
            }

            let content = "=".repeat(60) + "\n";
            content += "К. ЯНГТЫҢ ИНТЕРНЕТКЕ ТӘУЕЛДІЛІК ШКАЛАСЫ\n";
            content += "=".repeat(60) + "\n\n";
            
            content += "Аты-жөні: " + (fullName || "_______________") + "\n";
            content += "Топ атауы: " + (groupName || "_______________") + "\n";
            content += "Тест тапсырған күні: " + (formattedDate || "_______________") + "\n";
            content += "\n" + "-".repeat(60) + "\n\n";
            
            content += "СҰРАҚТАР ЖӘНЕ ЖАУАПТАР:\n";
            content += "-".repeat(60) + "\n\n";
            
            for (let i = 0; i < questions.length; i++) {
                const answerValue = answers[i];
                const answerText = getAnswerText(answerValue);
                content += `${i+1}. ${questions[i]}\n`;
                content += `   Жауап: ${answerText}\n\n`;
            }
            
            content += "-".repeat(60) + "\n\n";
            content += `ЖАЛПЫ БАЛЛ: ${totalScore} / 100\n\n`;
            
            // Интерпретация
            if (totalScore <= 30) {
                content += "Интерпретация: Интернетті қалыпты қолданушы\n";
            } else if (totalScore <= 49) {
                content += "Интерпретация: Интернетке тәуелділіктің бастапқы сатысы\n";
            } else if (totalScore <= 79) {
                content += "Интерпретация: Интернетке тәуелділіктің орташа деңгейі\n";
            } else {
                content += "Интерпретация: Жоғары интернет тәуелділігі\n";
            }
            
            content += "\n" + "=".repeat(60) + "\n";
            content += `Құрастырылған уақыт: ${new Date().toLocaleString('kk-KZ')}\n`;
            content += "=".repeat(60) + "\n";
            
            return new Blob([content], { type: 'text/plain;charset=utf-8' });
        }

        // Telegram ботқа жіберу
        async function sendToTelegram(blob, fileName) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('document', blob, fileName);
            
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                method: 'POST',
                body: formData
            });
            
            return await response.json();
        }

        // Негізгі функция
        async function submitTest() {
            const fullName = document.getElementById('fullName').value.trim();
            const groupName = document.getElementById('groupName').value.trim();
            const testDate = document.getElementById('testDate').value;

            if (!fullName) {
                showMessage('Аты-жөніңізді енгізіңіз!', 'error');
                return;
            }

            const { answers, allAnswered } = collectAnswers();

            if (!allAnswered) {
                showMessage('Барлық 20 сұраққа жауап беріңіз!', 'error');
                return;
            }

            let totalScore = 0;
            for (let i = 0; i < answers.length; i++) {
                totalScore += answers[i];
            }

            // Файл атын жасау
            const safeName = fullName.replace(/[^a-zA-Zа-яА-ЯқҚүҮәӘіІңҢөӨёЁ0-9]/g, '_');
            const fileName = `${safeName}_КЯнг_шкаласы.txt`;
            
            // TXT файлын жасау
            const blob = createTxtFile(fullName, groupName, testDate, answers, totalScore);
            
            showMessage('Жіберілуде...', 'loading');
            
            try {
                // Telegram ботқа жіберу
                const result = await sendToTelegram(blob, fileName);
                
                if (result.ok) {
                    showMessage('Жіберілді', 'success');
                } else {
                    showMessage('Қате кетті', 'error');
                }
            } catch (error) {
                showMessage('Қате кетті', 'error');
            }
        }

        function showMessage(text, type) {
            const msgDiv = document.getElementById('resultMessage');
            msgDiv.textContent = text;
            msgDiv.className = `result-message ${type}`;
            setTimeout(() => {
                msgDiv.style.display = 'none';
                msgDiv.className = 'result-message';
            }, 2000);
        }

        // Бет жүктелгенде
        window.onload = () => {
            setDefaultDate();
            renderQuestions();
        };
    </script>
</body>
</html>
